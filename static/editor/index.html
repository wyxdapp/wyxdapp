<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>富文本编辑器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .editor-container {
            max-width: 100%;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }

        .editor-toolbar {
            padding: 12px;
            border-bottom: 1px solid #e0e0e0;
            background: #f8f8f8;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .toolbar-btn {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .toolbar-btn:hover {
            background: #f0f0f0;
        }

        .toolbar-btn.active {
            background: #007AFF;
            color: white;
            border-color: #007AFF;
        }

        .editor-content {
            min-height: 300px;
            padding: 16px;
            outline: none;
            font-size: 16px;
            line-height: 1.6;
        }

        .action-buttons {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #007AFF;
            color: white;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="editor-container">
        <div class="editor-toolbar">
            <button class="toolbar-btn" onclick="execCommand('bold')">
                <strong>B</strong>
            </button>
            <button class="toolbar-btn" onclick="execCommand('italic')">
                <em>I</em>
            </button>
            <button class="toolbar-btn" onclick="execCommand('underline')">
                <u>U</u>
            </button>
            <button class="toolbar-btn" onclick="execCommand('insertUnorderedList')">
                • 列表
            </button>
            <button class="toolbar-btn" onclick="execCommand('insertOrderedList')">
                1. 列表
            </button>
            <button class="toolbar-btn" onclick="execCommand('justifyLeft')">
                左对齐
            </button>
            <button class="toolbar-btn" onclick="execCommand('justifyCenter')">
                居中
            </button>
            <button class="toolbar-btn" onclick="execCommand('justifyRight')">
                右对齐
            </button>
            <button class="toolbar-btn" onclick="insertImage()">
                📷 图片
            </button>
        </div>

        <div class="editor-content" contenteditable="true" id="editor"></div>

        <div class="action-buttons">
            <button class="btn btn-secondary" onclick="cancelEdit()">取消</button>
            <button class="btn btn-primary" onclick="saveContent()">保存</button>
        </div>
    </div>

    <script>
        var editor = null;
        var isUniAppReady = false;

        // 获取URL参数
        function getUrlParam(name) {
            var urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name) || '';
        }

        // 初始化编辑器
        function initEditor() {
            editor = document.getElementById('editor');

            // 加载初始内容
            var content = decodeURIComponent(getUrlParam('content') || '');
            if (content) {
                editor.innerHTML = content;
            }

            // 处理待插入的图片（从 URL 参数获取）
            var pendingImagesStr = getUrlParam('pendingImages');
            if (pendingImagesStr) {
                try {
                    var decodedStr = decodeURIComponent(pendingImagesStr);
                    var pendingImages = JSON.parse(decodedStr);
                    if (Array.isArray(pendingImages) && pendingImages.length > 0) {
                        // 延迟插入图片，确保编辑器已完全初始化
                        setTimeout(function() {
                            for (var i = 0; i < pendingImages.length; i++) {
                                var imageUrl = pendingImages[i];
                                if (imageUrl && typeof imageUrl === 'string' && imageUrl.trim() !== '') {
                                    insertImageToEditor(imageUrl);
                                }
                            }
                        }, 100);
                    }
                } catch (e) {
                    console.error('解析待插入图片失败:', e);
                }
            }

            // 监听内容变化
            editor.addEventListener('input', updateToolbarState);
            editor.addEventListener('keyup', updateToolbarState);
            editor.addEventListener('mouseup', updateToolbarState);

            // 防止默认粘贴行为
            editor.addEventListener('paste', function(e) {
                e.preventDefault();
                var text = (e.clipboardData || window.clipboardData).getData('text');
                document.execCommand('insertText', false, text);
            });
        }

        // 执行命令
        function execCommand(command, value) {
            value = value || null;
            document.execCommand(command, false, value);
            editor.focus();
            updateToolbarState();
        }

        // 插入图片 - 通知 uni-app 端打开图片选择器
        function insertImage() {
            console.log('点击图片按钮，准备发送消息到 uni-app');
            sendMessageToUniApp({
                type: 'selectImage'
            });
        }

        // 插入图片到编辑器
        function insertImageToEditor(imageUrl) {
            var img = document.createElement('img');
            img.src = imageUrl;
            img.style.maxWidth = '100%';
            img.style.height = 'auto';
            img.style.borderRadius = '4px';
            img.style.margin = '8px 0';

            var selection = window.getSelection();
            if (selection.rangeCount > 0) {
                var range = selection.getRangeAt(0);
                range.insertNode(img);
                range.setStartAfter(img);
                range.setEndAfter(img);
                selection.removeAllRanges();
                selection.addRange(range);
            } else {
                editor.appendChild(img);
            }

            editor.focus();
        }

        // 向 uni-app 发送消息
        function sendMessageToUniApp(data) {
            console.log('sendMessageToUniApp:', data);
            
            // 优先使用 uni-app x 的 postMessage
            if (typeof uni !== 'undefined' && uni.postMessage) {
                console.log('使用 uni.postMessage 发送消息');
                uni.postMessage({
                    data: data
                });
            }
            
            // 同时使用 window.parent.postMessage 直接发送（H5 环境兜底）
            // uni.postMessage 在 H5 端也是通过 parent.postMessage 发送，但会被 uni 运行时拦截
            // 这里额外发送一份不带 WEB_INVOKE_APPSERVICE 包装的消息，确保父组件能收到
            try {
                if (window.parent && window.parent !== window && window.parent.postMessage) {
                    console.log('使用 window.parent.postMessage 直接发送消息');
                    window.parent.postMessage(data, '*');
                }
            } catch(e) {
                console.error('window.parent.postMessage 发送失败:', e);
            }
        }

        // 更新工具栏状态
        function updateToolbarState() {
            var buttons = document.querySelectorAll('.toolbar-btn');
            buttons.forEach(function(btn) {
                var onclickStr = btn.onclick ? btn.onclick.toString() : '';
                var match = onclickStr.match(/execCommand\('([^']+)'/);
                if (match && match[1]) {
                    if (document.queryCommandState(match[1])) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                }
            });
        }

        // 保存内容
        function saveContent() {
            var content = editor.innerHTML;
            console.log('保存内容:', content);
            sendMessageToUniApp({
                type: 'editorContent',
                content: content
            });
        }

        // 取消编辑
        function cancelEdit() {
            console.log('取消编辑');
            sendMessageToUniApp({
                type: 'editorCancel'
            });
        }

        // 监听来自父页面的消息（H5 环境）
        window.addEventListener('message', function(event) {
            if (event.data) {
                if (event.data.type === 'setContent') {
                    editor.innerHTML = event.data.content || '';
                } else if (event.data.type === 'insertImage') {
                    insertImageToEditor(event.data.imageUrl);
                }
            }
        });

        // 监听 UniAppJSBridgeReady 事件
        document.addEventListener('UniAppJSBridgeReady', function() {
            console.log('UniAppJSBridgeReady 事件触发');
            isUniAppReady = true;
        });

        // 初始化
        document.addEventListener('DOMContentLoaded', initEditor);
    </script>
</body>
</html>
